<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TukTuk Milfontes - Offline</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        text-align: center;
      }

      .container {
        max-width: 400px;
        padding: 2rem;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      }

      .icon {
        font-size: 4rem;
        margin-bottom: 1rem;
      }

      h1 {
        margin: 0 0 1rem 0;
        font-size: 1.5rem;
        font-weight: 600;
      }

      p {
        margin: 0 0 2rem 0;
        line-height: 1.6;
        opacity: 0.9;
      }

      .retry-button {
        background: #4f46e5;
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 0.2s;
      }

      .retry-button:hover {
        background: #4338ca;
      }

      .status {
        margin-top: 1rem;
        font-size: 0.9rem;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📶</div>
      <h1>Sem Conexão</h1>
      <p>
        Parece que você está offline. Verifique sua conexão com a internet e
        tente novamente.
      </p>
      <button class="retry-button" onclick="window.location.reload()">
        Tentar Novamente
      </button>
      <div class="status" id="status">Verificando conexão...</div>
    </div>

    <script>
      // Verificar status da conexão
      function updateConnectionStatus() {
        const status = document.getElementById("status");
        if (navigator.onLine) {
          status.textContent =
            '✅ Conexão restaurada! Clique em "Tentar Novamente"';
          status.style.color = "#10b981";
        } else {
          status.textContent = "❌ Ainda sem conexão";
          status.style.color = "#ef4444";
        }
      }

      // Listeners para mudanças de conectividade
      window.addEventListener("online", updateConnectionStatus);
      window.addEventListener("offline", updateConnectionStatus);

      // Verificar status inicial
      updateConnectionStatus();

      // Verificar periodicamente
      setInterval(updateConnectionStatus, 3000);

      // Auto-reload quando voltar online
      window.addEventListener("online", () => {
        setTimeout(() => {
          window.location.reload();
        }, 1000);
      });
    </script>
  </body>
</html>
